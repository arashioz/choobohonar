server {
  listen 80;
  server_name 95.38.165.133;

  # Serve static uploads
  location /uploads/ {
    alias /var/www/uploads/;
    autoindex off;
  }

  # Proxy API requests to backend
  location /api/ {
    proxy_pass http://backend:3001/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Note: admin UI is served by the frontend. Do not proxy /admin/ to the
  # backend (the backend's API endpoints live under /api/admin). Leaving a
  # dedicated /admin/ proxy here caused requests for the admin UI to be sent
  # to the API, returning HTML/404 pages and breaking the client.
  # All other requests (including /admin) should fall through to the frontend
  # location / which is defined below.

  # All other requests go to frontend
  location / {
    proxy_pass http://frontend:3000/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
